<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zamanla Değişen Ürünler - Eşleştirme</title>
  <style>
    :root{
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      --bg: #0f172a;
      --text: #f1f5f9;
      --accent: #06b6d4;
    }

    /* UZAK UYGULAMA (IFRAME) ALANI */
    #remote-app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      margin: 0;
      padding: 0;
      z-index: 1;
    }

    #remote-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }

    /* LOCAL APP kapsayıcı */
    #local-app {
      display: none;
      width: 100%;
      height: 100%;
    }

    /* remote-mode'da body tam ekran, scalesiz olsun */
    body.remote-mode {
      margin: 0;
      padding: 0;
      display: block;
      transform: none;
      transform-origin: top left;
      overflow: hidden;
      background: #000;
    }

    /* Tam ekran karartma + ortalanmış içerik */
    #loading-overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      background-image: var(--bg-gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      font-size: 16px;
      z-index: 10000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Yükleme spinner'ı */
    #loading-overlay .spinner {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 4px solid rgba(148, 163, 184, 0.4);
      border-top-color: #06b6d4;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    /* Spinner animasyonu */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Sağda kırmızı kaynak etiketi */
    .source-badge {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #dc2626;
      color: #ffffff;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      z-index: 10001;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: none;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <!-- ÖNCE YÜKLEME EKRANI -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div>Bağlantı kontrol ediliyor...</div>
  </div>

  <!-- Uzak siteyi göstereceğimiz alan -->
  <div id="remote-app">
    <iframe id="remote-iframe" src="" allow="fullscreen"></iframe>
  </div>

  <!-- Local uygulama (iframe ile yüklenecek) -->
  <div id="local-app">
    <iframe id="local-iframe" src="" style="width:100%;height:100vh;border:none;"></iframe>
  </div>

  <!-- Sağ üstte kaynak etiketi -->
  <div id="source-badge" class="source-badge">LOCAL</div>

  <!-- DNS/Cloud kontrol scripti -->
  <script>
    const NETLIFY_URL = 'https://zamanladegisenurunler.netlify.app/';
    const VERCEL_URL  = 'https://zamanladegisenurunler.vercel.app/';
    // Local dosyanın yolu (aynı klasörde indexR.html olmalı)
    const LOCAL_FILE  = 'indexR.html';

    console.log('= SAYFA YÜKLENDİ - BAĞLANTI TESTİ BAŞLIYOR =');

    function logMode(message) {
      console.log(message);
    }

    // URL'e "girilebiliyor mu" basit testi
    function canReach(url, timeoutMs = 700) {
      return new Promise((resolve) => {
        let timedOut = false;
        const timer = setTimeout(() => {
          timedOut = true;
          console.warn('⏰ Zaman aşımı (timeout):', url);
          resolve(false);
        }, timeoutMs);

        fetch(url, {
          method: 'GET',
          mode: 'no-cors',
          cache: 'no-store'
        })
        .then(() => {
          if (!timedOut) {
            clearTimeout(timer);
            console.log('✅ Erişim başarılı (fetch çözüldü):', url);
            resolve(true);
          }
        })
        .catch((err) => {
          if (!timedOut) {
            clearTimeout(timer);
            console.warn('❌ Erişim hatası:', url, err);
            resolve(false);
          }
        });
      });
    }

    function applyMode(mode, url) {
      const remoteApp   = document.getElementById('remote-app');
      const localApp    = document.getElementById('local-app');
      const remoteIframe = document.getElementById('remote-iframe');
      const localIframe  = document.getElementById('local-iframe');
      const badge       = document.getElementById('source-badge');
      const loader      = document.getElementById('loading-overlay');

      // Yükleme ekranını kapat
      if (loader) loader.style.display = 'none';

      // Varsayılan: remote-mode'u temizle
      document.body.classList.remove('remote-mode');

      if (mode === 'netlify') {
        remoteIframe.src = url;
        remoteApp.style.display = 'block';
        localApp.style.display  = 'none';
        badge.textContent       = 'DNS1';
        document.body.classList.add('remote-mode');
      } else if (mode === 'vercel') {
        remoteIframe.src = url;
        remoteApp.style.display = 'block';
        localApp.style.display  = 'none';
        badge.textContent       = 'DNS2';
        document.body.classList.add('remote-mode');
      } else {
        // LOCAL
        localIframe.src = LOCAL_FILE;
        remoteApp.style.display = 'none';
        localApp.style.display  = 'block';
        badge.textContent       = 'CLOUD';
        // local modda remote-mode yok
      }

      badge.style.display = 'block';
    }

    async function decideSource() {
      console.log('🌐 Önce DNS1-N denenecek:', NETLIFY_URL);

      const netlifyOk = await canReach(NETLIFY_URL);
      if (netlifyOk) {
        logMode('✅ DNS1-N erişilebilir - iframe olarak yüklenecek.');
        applyMode('netlify', NETLIFY_URL);
        return;
      }

      console.log('⚠️ DNS1-N başarısız, DNS2-V deneniyor:', VERCEL_URL);
      const vercelOk = await canReach(VERCEL_URL);
      if (vercelOk) {
        logMode('✅ DNS2-V erişilebilir - iframe olarak yüklenecek.');
        applyMode('vercel', VERCEL_URL);
        return;
      }

      logMode('❌ DNS1-N ve DNS2-V erişilemiyor - CLOUD içerik gösterilecek.');
      applyMode('local');
    }

    document.addEventListener('DOMContentLoaded', decideSource);
  </script>
</body>
</html>
